[agentd]
# Path to the agentd executable used by service management.
# Relative paths are resolved from source_dir.
executable = ".venv/bin/agentd"

# Source tree for agentd itself. Relative paths are resolved from this config file.
source_dir = "/path/to/agentd"

# Workspace where Codex turns run.
workspace = "."
state_dir = "state"
log_level = "INFO"

[context]
# User-maintained context can live outside AGENTD_HOME and can be a separate git repo.
dir = "~/agent-context"
config = "context.toml"
schedules = "schedules.toml"

[feishu]
# app_id and app_secret can also be supplied by environment:
# AGENTD_FEISHU_APP_ID, AGENTD_FEISHU_APP_SECRET
app_id = ""
app_secret = ""
ignore_bot_messages = true
main_reply_in_thread = false
child_reply_in_thread = true

[codex]
# Defaults to "codex" if omitted. Set an absolute path or wrapper command if needed.
command = "codex"
model = ""
model_provider = ""
sandbox = "danger-full-access"
approval_policy = "never"
turn_timeout_seconds = 1800
startup_timeout_seconds = 60

[codex.capture]
# Capture final Codex POST /v1/responses requests through a local provider proxy.
enabled = false
upstream_mode = "codex-default" # codex-default, chatgpt, or api
upstream_url = "" # Optional explicit full upstream /responses URL.
save_sensitive_headers = false
archive_period = "week" # day, week, or month
archive_format = "tar.zst"
zstd_level = 10

[codex.otel]
# Capture Codex OpenTelemetry exports locally next to codex.capture artifacts.
enabled = false
environment = "agentd"
protocol = "json" # json is easier to analyze later; binary preserves OTLP protobuf payloads.
log_user_prompt = false
logs = true
traces = true
metrics = true
# Defaults below inherit codex.capture when omitted.
archive_period = "week" # day, week, or month
archive_format = "tar.zst"
zstd_level = 10
